# 指标参数配置
trend:
  ema_periods: [9, 21, 55, 200]
  sma_periods: [20, 50, 200]
  macd: {fast: 12, slow: 26, signal: 9}
  adx_period: 14

momentum:
  rsi_period: 14
  roc_period: 10
  cci_period: 20
  stoch: {k: 14, d: 3, smooth_k: 3}

volatility:
  atr_period: 14
  stddev_period: 20
  bbands: {period: 20, std: 2}

volume:
  mfi_period: 14
  cmf_period: 20
  vol_ratio_period: 20

math_factors:
  log_return_period: 1         # 对数收益率滞后阶数
  zscore_period: 20            # Z-Score 滚动窗口
  rank_period: 20              # 百分位排名窗口
  abs_return_period: 1         # 绝对收益率滞后阶数

timeseries:
  delay_period: 1          # 滞后阶数
  delta_period: 1          # 差分阶数
  ts_max_period: 20        # 滚动最大值窗口
  ts_min_period: 20        # 滚动最小值窗口
  ts_rank_period: 20       # 百分位排名窗口
  ts_zscore_period: 20     # Z-Score 窗口
  corr_period: 20          # 相关系数窗口

crypto_alpha:
  funding_rate_source: binance
  oi_delta_period: 24     # 小时
  cvd_lookback: 100
