# AlertManager config - Crypto AI Trader
route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: critical
      match:
        severity: critical
      repeat_interval: 1h
    - receiver: warning
      match:
        severity: warning
      repeat_interval: 6h

receivers:
    - name: default
    # webhook 待配置: Alertmanager 不支持 shell 变量，需填入真实 URL
    # webhook_configs:
    #   - url: http://alertmanager:9093/api/v1/alerts
    #     send_resolved: true
  - name: critical
  - name: warning

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
